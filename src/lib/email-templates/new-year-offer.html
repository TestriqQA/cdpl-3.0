<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            color: #333;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            border: 1px solid #eee;
            border-radius: 5px;
        }

        .header {
            background-color: #4f46e5;
            color: white;
            padding: 20px;
            text-align: center;
            border-radius: 5px 5px 0 0;
        }

        .content {
            padding: 20px;
        }

        .field {
            margin-bottom: 15px;
        }

        .label {
            font-weight: bold;
            color: #666;
            font-size: 0.9em;
        }

        .value {
            margin-top: 5px;
            font-size: 1.1em;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.8em;
            color: #888;
        }

        .highlight {
            color: #4f46e5;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h2>🎉 New Year Special Offer Enquiry</h2>
        </div>
        <div class="content">
            <p>You have received a new lead from the <strong>New Year Offer 50% OFF</strong> campaign page.</p>

            <div class="field">
                <div class="label">Name:</div>
                <div class="value">{{name}}</div>
            </div>

            <div class="field">
                <div class="label">Email:</div>
                <div class="value"><a href="mailto:{{email}}">{{email}}</a></div>
            </div>

            <div class="field">
                <div class="label">Phone:</div>
                <div class="value">{{phone}}</div>
            </div>

            <div class="field">
                <div class="label">Interested Course:</div>
                <div class="value highlight">{{course}}</div>
            </div>

            <div class="field">
                <div class="label">Source:</div>
                <div class="value">{{source}}</div>
            </div>
        </div>
        <div class="footer">
            <p>This email was sent from the CDPL Website.</p>
        </div>
    </div>
</body>

</html>
